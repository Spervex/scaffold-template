version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
      - 'npm'
    versioning-strategy: increase
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
    # Security-only updates; Renovate handles routine maintenance
    groups:
      typescript-eslint:
        patterns:
          - '@typescript-eslint/*'
          - 'typescript-eslint'
      commitlint:
        patterns:
          - '@commitlint/*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
